syntax = "proto3";

package mlsolid.v1;

import "google/protobuf/timestamp.proto";

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_PENDING = 1;
  STATUS_PROGRESS = 2;
  STATUS_SUCCESS = 3;
  STATUS_FAILED = 4;
}

message Val {
  oneof val {
    int64 int = 2;
    double double = 3;
    string str = 4;
  }
}

message MetaData {
  string name = 1;
  string type = 2;
  string run_id = 3;
}

message Content {
  bytes content = 1;
}

service MlsolidService {
  rpc Experiments(ExperimentsRequest) returns (ExperimentsResponse);
  rpc Experiment(ExperimentRequest) returns (ExperimentResponse);
  rpc CreateRun(CreateRunRequest) returns (CreateRunResponse);
  rpc Run(RunRequest) returns (RunResponse);
  rpc Runs(RunsRequest) returns (RunsResponse);
  rpc AddMetrics(AddMetricsRequest) returns (AddMetricsResponse);
  rpc AddArtifact(stream AddArtifactRequest) returns (AddArtifactResponse);
  rpc Artifact(ArtifactRequest) returns (stream ArtifactResponse);

  // Model registry methods
  rpc CreateModelRegistry(CreateModelRegistryRequest) returns (CreateModelRegistryResponse);
  rpc ModelRegistry(ModelRegistryRequest) returns (ModelRegistryResponse);
  rpc AddModelEntry(AddModelEntryRequest) returns (AddModelEntryResponse);
  rpc TaggedModel(TaggedModelRequest) returns (TaggedModelResponse);
  rpc StreamTaggedModel(StreamTaggedModelRequest) returns (stream StreamTaggedModelResponse);
  rpc TagModel(TagModelRequest) returns (TagModelResponse);
  rpc SetBenchmarkContainer(SetBenchmarkContainerRequest) returns (SetBenchmarkContainerResponse);

  // Benchmarks
  rpc Benchmark(BenchmarkRequest) returns (BenchmarkResponse);
  rpc CreateBenchmark(CreateBenchmarkRequest) returns (CreateBenchmarkResponse);
  rpc ToggleBenchmark(ToggleBenchmarkRequest) returns (ToggleBenchmarkResponse);
  rpc UpdateBenchmark(UpdateBenchmarkRequest) returns (UpdateBenchmarkResponse);
  rpc DeleteBenchmark(DeleteBenchmarkRequest) returns (DeleteBenchmarkResponse);
  rpc BenchmarkRuns(BenchmarkRunsRequest) returns (BenchmarkRunsResponse);
  rpc BestModel(BestModelRequest) returns (BestModelResponse);
  rpc Benchmarks(BenchmarksRequest) returns (BenchmarksResponse);
}

message Metric {
  string name = 1;
  repeated Val vals = 2;
}

message Run {
  string run_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string experiment_id = 3;
  map<string, Metric> metrics = 4;
}

message ModelEntry {
  string url = 1;
  repeated string tags = 2;
}

message ModelEntryList {
  repeated int32 indx = 1;
}

message ModelEntryTags {
  map<string, ModelEntryList> entries = 1;
}

message ExperimentsRequest {}

message ExperimentsResponse {
  repeated string exp_ids = 1;
}

message ExperimentRequest {
  string exp_id = 1;
}

message ExperimentResponse {
  repeated string run_ids = 1;
  string desc = 2;
}

message CreateRunRequest {
  string run_id = 1;
  string experiment_id = 2;
}

message CreateRunResponse {
  string run_id = 1;
}

message RunRequest {
  string run_id = 1;
}

message RunResponse {
  string run_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string experiment_id = 3;
  map<string, Metric> metrics = 4;
}

message RunsRequest {
  repeated string run_ids = 1;
}

message RunsResponse {
  repeated Run runs = 1;
}

message AddMetricsRequest {
  string run_id = 1;
  repeated Metric metrics = 2;
}

message AddMetricsResponse {
  bool added = 1;
}

message AddArtifactRequest {
  oneof request {
    MetaData metadata = 1;
    Content content = 2;
  }
}

message AddArtifactResponse {
  string name = 1;
  Status status = 2;
  uint64 size = 3;
  string s3_url = 4;
}

message ArtifactRequest {
  string run_id = 1;
  string artifact_name = 2;
}

message ArtifactResponse {
  oneof request {
    MetaData metadata = 1;
    Content content = 2;
  }
}

message CreateModelRegistryRequest {
  string name = 1;
}

message CreateModelRegistryResponse {
  bool created = 1;
}

message ModelRegistryRequest {
  string name = 1;
}

message ModelRegistryResponse {
  string name = 1;
  repeated ModelEntry model_entries = 2;
  ModelEntryTags tags = 3;
}

message AddModelEntryRequest {
  string name = 1;
  string run_id = 2;
  string artifact_id = 3;
  repeated string tags = 4;
}

message AddModelEntryResponse {
  bool added = 1;
}

message TaggedModelRequest {
  string name = 1;
  string tag = 2;
}

message TaggedModelResponse {
  ModelEntry entry = 1;
}

message StreamTaggedModelRequest {
  string name = 1;
  string tag = 2;
}

message StreamTaggedModelResponse {
  oneof response {
    MetaData metadata = 1;
    Content content = 2;
  }
}

message TagModelRequest {
  string name = 1;
  int32 version = 2;
  repeated string tags = 3;
}

message TagModelResponse {
  bool added = 1;
}

message SetBenchmarkContainerRequest {
  string registry_name = 1;
  string container_url = 2;
}

message SetBenchmarkContainerResponse {
  bool set = 1;
}

message BenchmarkMetric {
  string name = 1;
  bool desc_sort = 2;

}

message BenchmarkRequest {
  string benchmark_id = 1;
}

message BenchmarkResponse {
  string name = 1;
  bool eager_start = 2;
  bool auto_tag = 3;
  string tag = 4;
  repeated string model_registries = 5;
  repeated BenchmarkMetric metrics = 6;
  string decision_metric = 7;
  string dataset_name = 8;
  string dataset_url = 9;
  bool from_s3 = 10;
  string benchmark_id = 11;
}

message CreateBenchmarkRequest {
  string name = 1;
  bool eager_start = 2;
  bool auto_tag = 3;
  string tag = 4;
  repeated string model_registries = 5;
  repeated BenchmarkMetric metrics = 6;
  string decision_metric = 7;
  string dataset_name = 8;
  string dataset_url = 9;
  bool from_s3 = 10;
}

message CreateBenchmarkResponse {
  bool created = 1;
  string benchmark_id = 2;
}

message ToggleBenchmarkRequest {
  bool paused = 1;
  string benchmark_id = 2;
}
message ToggleBenchmarkResponse {
  bool paused = 1;
}

message UpdateBenchmarkRequest {
  optional string name = 1;
  optional bool auto_tag = 2;
  optional string tag = 3;
  repeated string add_registires = 4;
  repeated string remove_registries = 5;
  repeated BenchmarkMetric add_metrics = 6;
  repeated string remove_metrics = 7;
  optional string decision_metric = 8;
  string benchmark_id = 9;
}
message UpdateBenchmarkResponse {
  string name = 1;
  bool auto_tag = 2;
  string tag = 3;
  repeated string model_registries = 4;
  repeated BenchmarkMetric metrics = 5;
  string decision_metric = 6;
}

message DeleteBenchmarkRequest {
  string benchmark_id = 1;
}

message DeleteBenchmarkResponse {
  bool deleted = 1;
}

message BenchmarkRunsRequest {
  string benchmark_id = 1;
}
message BenchmarkRunsResponse {
  repeated RunMetrics runs = 1;
}

message RunMetrics {
  map<string, float> metrics = 1;
  string registry = 2;
  int64 version = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message BestModelRequest {
  string benchmark_id = 1;
  repeated string metrics = 2;
}

message BestModelResponse {
  map<string, RunMetrics> best_models = 1;
}

message BenchmarksRequest {}
message BenchmarksResponse {
  repeated string benchmarks = 1;
}
